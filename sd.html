<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Matchbox Game - Admin + User Panel (Demo)</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1a3d2e, #0e2a1c);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 16px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .tab-btn {
            background: #2f4a22;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            color: #ffe3a5;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #f0a035;
            color: #2c1a0a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .panel {
            display: none;
            background: #e8dbbf;
            border-radius: 50px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .panel.active {
            display: block;
        }
        /* Admin Panel Styles */
        .admin-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .admin-card {
            background: #f5ebd3;
            border-radius: 30px;
            padding: 15px;
            flex: 1;
            min-width: 250px;
            box-shadow: 0 5px 0 #b58750;
        }
        .admin-card h3 {
            margin: 0 0 10px;
            color: #3a2c18;
        }
        input, select, button {
            padding: 8px 12px;
            border-radius: 30px;
            border: none;
            margin: 5px;
        }
        .btn {
            background: #f0a035;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-danger {
            background: #a5522a;
            color: white;
        }
        .user-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .user-item {
            background: #fff5e2;
            margin: 8px 0;
            padding: 10px;
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        /* User Panel Styles */
        .user-info {
            background: #b58750;
            border-radius: 40px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .balance {
            background: #2f4a22;
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffefb0;
            font-weight: bold;
        }
        .game-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .column {
            background: #b58750;
            border-radius: 35px;
            padding: 15px;
            width: 45%;
            min-width: 250px;
            text-align: center;
        }
        .top-card {
            background: #fff5e2;
            border-radius: 20px;
            padding: 15px;
            margin: 10px auto;
            width: 120px;
            box-shadow: 0 5px 0 #8b551f;
        }
        .card-stack-hint {
            font-size: 0.7rem;
            color: #2c2416;
            margin-top: 5px;
        }
        .action-btn {
            background: #f0a035;
            font-size: 1.3rem;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin: 15px auto;
            display: inline-block;
        }
        .match-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: gold;
            padding: 20px 40px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.5rem;
            z-index: 1000;
            box-shadow: 0 0 30px black;
            text-align: center;
        }
        @media (max-width: 700px) {
            .column { width: 100%; }
            .user-item { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <button class="tab-btn active" data-tab="user">🎮 यूजर पैनल</button>
        <button class="tab-btn" data-tab="admin">👑 एडमिन पैनल</button>
    </div>

    <!-- USER PANEL -->
    <div id="userPanel" class="panel active">
        <div id="userLoginArea">
            <div style="text-align:center; padding:20px;">
                <h2>🎲 यूजर लॉगिन</h2>
                <input type="text" id="loginUsername" placeholder="यूजरनेम" style="padding:10px 20px;">
                <button class="btn" id="loginBtn">लॉगिन / नया अकाउंट</button>
                <p style="margin-top:15px;">नए यूजर को 10 फ्री कार्ड मिलेंगे | हर जीत पर 1 कार्ड कटेगा</p>
            </div>
        </div>
        <div id="userGameArea" style="display:none;">
            <div class="user-info">
                <span>👤 <span id="currentUsername">-</span></span>
                <span class="balance">📦 कार्ड: <span id="userBalance">0</span></span>
                <span>🏆 जीत: <span id="userWins">0</span></span>
                <button class="btn" id="logoutBtn">लॉगआउट</button>
            </div>
            <div class="game-area">
                <div class="column">
                    <h3>🎴 खिलाड़ी 1</h3>
                    <div id="col1Top" class="top-card">⬜ कोई कार्ड नहीं</div>
                    <div id="col1Hint" class="card-stack-hint"></div>
                </div>
                <div class="column">
                    <h3>🎴 खिलाड़ी 2</h3>
                    <div id="col2Top" class="top-card">⬜ कोई कार्ड नहीं</div>
                    <div id="col2Hint" class="card-stack-hint"></div>
                </div>
            </div>
            <div style="text-align:center;">
                <button class="action-btn" id="playBtn">🎴 रखो (बिना देखे)</button>
            </div>
            <div id="gameMsg" style="text-align:center; margin-top:15px; background:#201f12cc; padding:10px; border-radius:40px; color:#ffefbc;">👇 'रखो' दबाएं | जीतने पर 1 कार्ड कटेगा</div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="panel">
        <div style="text-align:center; margin-bottom:20px;">
            <h2>👑 एडमिन पैनल</h2>
            <input type="password" id="adminPass" placeholder="एडमिन पासवर्ड" style="padding:8px 15px;">
            <button class="btn" id="adminLoginBtn">लॉगिन</button>
            <span id="adminStatus" style="margin-left:10px;"></span>
        </div>
        <div id="adminContent" style="display:none;">
            <div class="admin-grid">
                <div class="admin-card">
                    <h3>➕ यूजर को कार्ड दें</h3>
                    <input type="text" id="addUser" placeholder="यूजरनेम">
                    <input type="number" id="addCards" placeholder="कार्ड संख्या" value="10">
                    <button class="btn" id="addCardsBtn">कार्ड दें</button>
                </div>
                <div class="admin-card">
                    <h3>📊 सभी यूजर</h3>
                    <div id="userList" class="user-list"></div>
                </div>
                <div class="admin-card">
                    <h3>⚙️ सेटिंग</h3>
                    <label>जीत पर कटौती: </label>
                    <input type="number" id="cutPerWin" value="1" min="0" max="10" style="width:70px;">
                    <button class="btn" id="saveSettingsBtn">सेव करें</button>
                    <button class="btn btn-danger" id="resetAllBtn">सारा डाटा रीसेट</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- DATA STRUCTURE ----------
    let users = {};     // { username: { cards, wins } }
    let currentUser = null;
    let adminLoggedIn = false;
    let gameState = { col1: [], col2: [], currentTurn: 1, gameActive: true, matchCards: null };
    let currentGameUser = null;
    let winCut = 1;     // har win pe kitne cards cut honge
    
    // Load data from localStorage
    function loadData() {
        let saved = localStorage.getItem("matchbox_game_data");
        if(saved) {
            let data = JSON.parse(saved);
            users = data.users || {};
            winCut = data.winCut !== undefined ? data.winCut : 1;
        }
        if(Object.keys(users).length === 0) {
            // Demo users
            users["raj"] = { cards: 25, wins: 3 };
            users["sam"] = { cards: 15, wins: 1 };
            users["test"] = { cards: 10, wins: 0 };
        }
        saveData();
    }
    
    function saveData() {
        let data = { users: users, winCut: winCut };
        localStorage.setItem("matchbox_game_data", JSON.stringify(data));
    }
    
    // Brand/face generation for game
    const BRANDS = ["Rajshree", "Chameli", "Mangaldeep", "786", "Kohinoor", "Shalimar"];
    function randomCard() {
        let brand = BRANDS[Math.floor(Math.random() * BRANDS.length)];
        let face = Math.random() < 0.5 ? "🔥 फ्रंट" : "⚙️ बैक";
        return { brand, face, icon: face === "🔥 फ्रंट" ? "🕉️" : "📦" };
    }
    
    function renderCardUI(card) {
        if(!card) return `<div>⬜ खाली</div>`;
        return `<div style="font-size:1.5rem;">${card.icon}</div><div>${card.brand}</div><div style="font-size:0.7rem;">${card.face}</div>`;
    }
    
    function updateGameUI() {
        let col1Div = document.getElementById("col1Top");
        let col1Hint = document.getElementById("col1Hint");
        if(gameState.col1.length === 0) {
            col1Div.innerHTML = `<div>⬜ कोई कार्ड नहीं</div>`;
            col1Hint.innerHTML = "";
        } else {
            let top = gameState.col1[gameState.col1.length-1];
            col1Div.innerHTML = renderCardUI(top);
            if(gameState.col1.length > 1) col1Hint.innerHTML = `📚 +${gameState.col1.length-1} नीचे`;
            else col1Hint.innerHTML = `✨ सिर्फ एक कार्ड`;
        }
        
        let col2Div = document.getElementById("col2Top");
        let col2Hint = document.getElementById("col2Hint");
        if(gameState.col2.length === 0) {
            col2Div.innerHTML = `<div>⬜ कोई कार्ड नहीं</div>`;
            col2Hint.innerHTML = "";
        } else {
            let top = gameState.col2[gameState.col2.length-1];
            col2Div.innerHTML = renderCardUI(top);
            if(gameState.col2.length > 1) col2Hint.innerHTML = `📚 +${gameState.col2.length-1} नीचे`;
            else col2Hint.innerHTML = `✨ सिर्फ एक कार्ड`;
        }
    }
    
    function showMatchPopup(card1, card2, winner) {
        let popup = document.createElement("div");
        popup.className = "match-popup";
        popup.innerHTML = `
            <div style="display:flex; gap:20px; align-items:center;">
                <div>${renderCardUI(card1)}</div>
                <div>⚡ = ⚡</div>
                <div>${renderCardUI(card2)}</div>
            </div>
            <div style="margin-top:10px;">🏆 खिलाड़ी ${winner} जीता! -${winCut} कार्ड 🏆</div>
        `;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 3000);
    }
    
    function applyMatch(winnerPlayer) {
        let allCards = [...gameState.col1, ...gameState.col2];
        let winAmount = allCards.length;
        let currentUserObj = users[currentGameUser];
        if(currentUserObj) {
            // Har win pe winCut cards katenge
            let newCards = currentUserObj.cards + winAmount - winCut;
            if(newCards < 0) newCards = 0;
            currentUserObj.cards = newCards;
            currentUserObj.wins = (currentUserObj.wins || 0) + 1;
            saveData();
            document.getElementById("userBalance").innerText = currentUserObj.cards;
            document.getElementById("userWins").innerText = currentUserObj.wins;
        }
        let top1 = gameState.col1[gameState.col1.length-1];
        let top2 = gameState.col2[gameState.col2.length-1];
        showMatchPopup(top1, top2, winnerPlayer);
        gameState.col1 = [];
        gameState.col2 = [];
        gameState.currentTurn = 1;
        gameState.gameActive = true;
        updateGameUI();
        document.getElementById("gameMsg").innerHTML = `💥 मैच! खिलाड़ी ${winnerPlayer} ने ${winAmount} कार्ड जीते | ${winCut} कार्ड कटे 💥`;
        setTimeout(() => {
            if(gameState.gameActive) document.getElementById("gameMsg").innerHTML = "खेल जारी... 'रखो' दबाएं";
        }, 3000);
    }
    
    function placeCard() {
        if(!currentGameUser || !users[currentGameUser]) {
            document.getElementById("gameMsg").innerHTML = "पहले लॉगिन करें!";
            return;
        }
        if(users[currentGameUser].cards <= 0) {
            document.getElementById("gameMsg").innerHTML = "⚠️ आपके पास कोई कार्ड नहीं! एडमिन से संपर्क करें ⚠️";
            return;
        }
        if(!gameState.gameActive) {
            document.getElementById("gameMsg").innerHTML = "गेम एक्टिव नहीं है";
            return;
        }
        
        let newCard = randomCard();
        if(gameState.currentTurn === 1) {
            gameState.col1.push(newCard);
        } else {
            gameState.col2.push(newCard);
        }
        
        // Deduct 1 card from user's balance per move
        users[currentGameUser].cards -= 1;
        if(users[currentGameUser].cards < 0) users[currentGameUser].cards = 0;
        saveData();
        document.getElementById("userBalance").innerText = users[currentGameUser].cards;
        
        updateGameUI();
        
        // Check match
        if(gameState.col1.length > 0 && gameState.col2.length > 0) {
            let top1 = gameState.col1[gameState.col1.length-1];
            let top2 = gameState.col2[gameState.col2.length-1];
            if(top1.brand === top2.brand && top1.face === top2.face) {
                applyMatch(gameState.currentTurn);
                return;
            }
        }
        
        gameState.currentTurn = (gameState.currentTurn === 1) ? 2 : 1;
        document.getElementById("gameMsg").innerHTML = `अब खिलाड़ी ${gameState.currentTurn} की बारी`;
    }
    
    function resetGameSession() {
        gameState = { col1: [], col2: [], currentTurn: 1, gameActive: true, matchCards: null };
        if(currentGameUser && users[currentGameUser]) {
            updateGameUI();
        }
    }
    
    // User Login
    document.getElementById("loginBtn").addEventListener("click", () => {
        let username = document.getElementById("loginUsername").value.trim();
        if(!username) { alert("यूजरनेम डालें"); return; }
        if(!users[username]) {
            users[username] = { cards: 10, wins: 0 };  // New user gets 10 free cards
            saveData();
        }
        currentUser = username;
        currentGameUser = username;
        document.getElementById("currentUsername").innerText = username;
        document.getElementById("userBalance").innerText = users[username].cards;
        document.getElementById("userWins").innerText = users[username].wins || 0;
        document.getElementById("userLoginArea").style.display = "none";
        document.getElementById("userGameArea").style.display = "block";
        resetGameSession();
    });
    
    document.getElementById("logoutBtn").addEventListener("click", () => {
        currentUser = null;
        currentGameUser = null;
        document.getElementById("userLoginArea").style.display = "block";
        document.getElementById("userGameArea").style.display = "none";
        resetGameSession();
    });
    
    document.getElementById("playBtn").addEventListener("click", placeCard);
    
    // Admin Functions
    document.getElementById("adminLoginBtn").addEventListener("click", () => {
        let pass = document.getElementById("adminPass").value;
        if(pass === "admin123") {
            adminLoggedIn = true;
            document.getElementById("adminContent").style.display = "block";
            document.getElementById("adminStatus").innerHTML = "✅ लॉगिन सफल";
            refreshUserList();
        } else {
            alert("गलत पासवर्ड");
        }
    });
    
    function refreshUserList() {
        let listDiv = document.getElementById("userList");
        listDiv.innerHTML = "";
        for(let [name, data] of Object.entries(users)) {
            let div = document.createElement("div");
            div.className = "user-item";
            div.innerHTML = `
                <span><strong>${name}</strong> | 📦 ${data.cards} | 🏆 ${data.wins || 0}</span>
                <div>
                    <button class="btn" onclick="adminAddCards('${name}', 10)">+10</button>
                    <button class="btn btn-danger" onclick="adminRemoveUser('${name}')">हटाएं</button>
                </div>
            `;
            listDiv.appendChild(div);
        }
    }
    
    window.adminAddCards = function(username, amount) {
        if(users[username]) {
            users[username].cards += amount;
            saveData();
            refreshUserList();
            if(currentGameUser === username) {
                document.getElementById("userBalance").innerText = users[username].cards;
            }
        }
    };
    
    window.adminRemoveUser = function(username) {
        if(confirm("यूजर हटाएं?")) {
            delete users[username];
            saveData();
            refreshUserList();
            if(currentGameUser === username) {
                document.getElementById("logoutBtn").click();
            }
        }
    };
    
    document.getElementById("addCardsBtn").addEventListener("click", () => {
        let uname = document.getElementById("addUser").value.trim();
        let qty = parseInt(document.getElementById("addCards").value);
        if(uname && users[uname] && qty>0) {
            users[uname].cards += qty;
            saveData();
            refreshUserList();
            if(currentGameUser === uname) {
                document.getElementById("userBalance").innerText = users[uname].cards;
            }
            document.getElementById("addUser").value = "";
        } else {
            alert("यूजर मौजूद नहीं");
        }
    });
    
    document.getElementById("saveSettingsBtn").addEventListener("click", () => {
        let newCut = parseInt(document.getElementById("cutPerWin").value);
        if(!isNaN(newCut) && newCut >= 0) {
            winCut = newCut;
            saveData();
            alert("सेटिंग सेव हो गई");
        }
    });
    
    document.getElementById("resetAllBtn").addEventListener("click", () => {
        if(confirm("सारा डाटा डिलीट हो जाएगा! क्या आप sure हैं?")) {
            localStorage.removeItem("matchbox_game_data");
            users = {};
            winCut = 1;
            loadData();
            refreshUserList();
            if(currentGameUser) document.getElementById("logoutBtn").click();
            alert("रीसेट हो गया");
        }
    });
    
    // Tab switching
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
            document.getElementById(btn.dataset.tab + "Panel").classList.add("active");
            if(btn.dataset.tab === "admin" && adminLoggedIn) refreshUserList();
        });
    });
    
    loadData();
</script>
</body>
</html>
